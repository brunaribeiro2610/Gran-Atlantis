<div class="card-atlantis mt-4">
    <h4 class="text-gold"><i class="bi bi-box-sealer"></i> Encomendas na Portaria</h4>
    <hr class="border-secondary">
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr class="text-gold">
                    <th>Morador / Unidade</th>
                    <th>Descrição</th>
                    <th>Chegada</th>
                    <th class="text-center">Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for e in encomendas %}
                <tr>
                    <td>{{ e.morador.get_full_name }} ({{ e.morador.apartamento }})</td>
                    <td>{{ e.descricao }}</td>
                    <td>{{ e.data_recebimento|date:"d/m H:i" }}</td>
                    <td class="text-center">
                        <a href="{% url 'entregar_encomenda' e.pk %}" class="btn btn-sm btn-atlantis">
                            📦 Entregar
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center text-white-50">Nenhuma encomenda pendente.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
