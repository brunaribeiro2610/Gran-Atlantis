<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Gran Atlantis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .card-acesso { 
            background-color: #1a1a1a; 
            border: 2px solid #c5a059; 
            border-radius: 20px; 
            max-width: 350px; 
            margin: 50px auto; 
            padding: 30px;
        }
        #qrcode img { margin: 0 auto; border: 10px solid white; border-radius: 10px; }
        .gold-text { color: #c5a059; }
    </style>
</head>
<body>

    <div class="card-acesso text-center shadow-lg">
        <h2 class="gold-text fw-bold">GRAN ATLANTIS</h2>
        <p class="text-white-50">Convite de Acesso</p>
        <hr style="border-color: #c5a059;">
        
        <p class="mb-1">Visitante:</p>
        <h4 class="fw-bold">{{ visita.nome }}</h4>
        
        <p class="mt-3 mb-1">Data autorizada:</p>
        <h5 class="text-white-50">{{ visita.data_visita|date:"d/m/Y" }}</h5>

        <div id="qrcode" class="my-4"></div>

        <p class="small text-white-50">Apresente este código ao porteiro</p>
        
        <button onclick="window.print()" class="btn btn-sm btn-outline-secondary mt-2">Salvar como PDF</button>
    </div>

    <script>
    function compartilharWhatsApp() {
    const nome = "{{ visita.nome }}";
    const data = "{{ visita.data_visita|date:'d/m/Y' }}";
    const linkAcesso = "https://pyrophoric-daleyza-precorruptive.ngrok-free.dev/visita/detalhes/{{ visita.id }}/";
    
    const texto = `Olá ${nome}! Seu convite para o Gran Atlantis está pronto. ✅\n📅 Data: ${data}\n\nApresente o QR Code no link abaixo ao chegar:\n${linkAcesso}`;
    
    // Abre o WhatsApp
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');

    // MÁGICA: Redireciona o morador de volta para o painel dele
    setTimeout(function() {
        window.location.href = "{% url 'dashboard' %}";
    }, 800); // 800ms é um tempo seguro para abrir o zap e mudar a tela
}
</script>
</body>
</html>
