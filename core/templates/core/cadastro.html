{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card-atlantis shadow-lg">
            <h2 class="text-center mb-4" style="color: var(--gold-logo);">Membro Gran Atlantis</h2>
            <p class="text-center text-muted small">Preencha seus dados para solicitar acesso ao condomínio.</p>
            
            <form method="post" class="mt-4">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-atlantis w-100 py-2 mt-3">Solicitar Cadastro</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{% url 'core:dashboard' %}" class="text-muted small text-decoration-none">Já possui conta? <span class="text-gold">Entrar</span></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
